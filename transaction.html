<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="transaction.css">
</head>

<body>
    <header>
        <nav class="navigation" aria-label="Main Navigation">
            <div class="navigationbox">

                <div class="logo">
                    <a href="dashboard.html">
                        <img src="person.png" alt="Company Logo" class="logopicture">
                        <span class="brand-name">Personal Finance</span>
                    </a>
                </div>

                <ul class="nav-links">
                    <li><a href="dashboard.html">Dashboard</a></li>
                    <li><a href="history.html">History</a></li>
                    <li><a href="statistics.html">Statistics</a></li>
                    <li><a href="transaction.html">Transaction</a></li>
                </ul>

                <div class="responsivebox">
                    <button id="responsiveBtn" aria-label="Toggle navigation" aria-expanded="false">
                        <img src="list.png" alt="Menu icon" class="hamburger">
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <div class="overlay"></div>
    <div class="hidden">
        <ul class="navs-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="statistics.html">Statistics</a></li>
            <li><a href="transaction.html">Transaction</a></li>
        </ul>
    </div>

    <main>
        <div>
            <h1>Transaction</h1>
        </div>
        <section class="formcontainer">
            <form id="transactionForm" class="inputBox">

                <div class="box">
                    <label for="titleInput">Title:</label>
                    <input type="text" id="titleInput" placeholder="Lunch">
                </div>

                <div class="box">
                    <label for="amountInput">Amount:</label>
                    <input type="number" id="amountInput" placeholder="100ETB" min="0">
                </div>

                <div class="box">
                    <label for="typeInput">Type:</label>
                    <select id="typeInput">
                        <option value="expense">Expense</option>
                        <option value="income">Income</option>
                        <option value="saving">Saving</option>
                    </select>
                </div>

                <div class="box">
                    <label for="category">Category:</label>
                    <input type="text" id="category" placeholder="food">
                </div>

                <div class="box">
                    <label for="dateInput">Date:</label>
                    <input type="date" id="dateInput">
                </div>
                <button type="submit" class="saveBtn"> Save</button>
            </form>

        </section>
    </main>
    <script src="transaction.js"></script>
    <script src="ui.js"></script>
</body>

</html>
